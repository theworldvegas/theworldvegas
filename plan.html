<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Biniyog | Balance</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Hind Siliguri',sans-serif;
  min-height:100vh;
  background:url("https://raw.githubusercontent.com/theworldvegas/theworldvegas/main/assets/background.jpg") center center/cover no-repeat fixed;
}

/* Top Section */
.top-area{
  padding:18px;
}

/* Glass Balance Box */
.balance-box{
  width:100%;
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);

  border:1px solid rgba(255,255,255,.15);
  border-radius:20px;

  padding:22px;

  text-align:center;

  box-shadow:
      0 8px 30px rgba(0,0,0,.35),
      inset 0 0 10px rgba(255,255,255,.05);
}

.balance-title{
  color:#ffffff;
  font-size:15px;
  opacity:.85;
  margin-bottom:10px;
}

.balance{
  color:#00ff88;
  font-size:34px;
  font-weight:700;
  text-shadow:0 0 12px rgba(0,255,136,.45);
}
</style>
</head>

<body>

<div class="top-area">

<div class="balance-box">

<div class="balance-title">
Current Balance
</div>

<div class="balance">
৳ <span id="balance">0</span>
</div>

</div>

</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
import {
  getFirestore,
  doc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

/* Firebase Config */
const firebaseConfig = {
  apiKey: "AIzaSyBFsTzlRPoWHVXEHbKrPdwxslxZGa7Kqfw",
  authDomain: "biniyog-95d00.firebaseapp.com",
  projectId: "biniyog-95d00"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* Login Check + Live Balance */
onAuthStateChanged(auth,(user)=>{

  if(!user){
    location.href="index.html";
    return;
  }

  onSnapshot(doc(db,"users",user.uid),(snap)=>{

    if(snap.exists()){
      document.getElementById("balance").innerText =
        snap.data().balance || 0;
    }

  });

});
</script>
</body>
</html>
