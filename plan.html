<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Biniyog | Balance</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Hind Siliguri',sans-serif;

    background:url("https://raw.githubusercontent.com/theworldvegas/theworldvegas/main/assets/background.jpg")
    center center/cover no-repeat fixed;

    min-height:100vh;

    padding:20px;
}

/* Dark Overlay */

body::before{

    content:"";

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.20);

    z-index:-1;
}

/* Glass Balance Box */

.box{

    width:100%;

    max-width:420px;

    margin:20px auto;

    padding:18px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    background:rgba(255,255,255,.12);

    border:1px solid rgba(255,255,255,.18);

    backdrop-filter:blur(18px);

    -webkit-backdrop-filter:blur(18px);

    border-radius:22px;

    box-shadow:
        0 10px 35px rgba(0,0,0,.35),
        inset 0 1px rgba(255,255,255,.25);
}

.left{

    flex:1;
}

.small{

    color:#dddddd;

    font-size:15px;

    margin-bottom:8px;
}

.balance{

    font-size:30px;

    font-weight:bold;

    color:#ffffff;
}

.right img{

    width:90px;

    height:90px;

    object-fit:contain;
}

</style>

</head>

<body>

<div class="box">

    <div class="left">

        <div class="small">
            Current Balance
        </div>

        <div class="balance">
            ৳ <span id="balance">0</span>
        </div>

    </div>

    <div class="right">

        <img src="https://raw.githubusercontent.com/theworldvegas/theworldvegas/main/assets/index.gif" alt="Balance">

    </div>

</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
import {
  getFirestore,
  doc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

/* Firebase Config */
const firebaseConfig = {
  apiKey: "AIzaSyDzC0YtyxLS0y2gCHMElbXQgYQBkB_2WQ",
  authDomain: "theworldvegas-53640.firebaseapp.com",
  projectId: "theworldvegas-53640"
};

/* Initialize Firebase */
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* Load Current Balance */
onAuthStateChanged(auth, (user) => {

    if (!user) {
        location.href = "indx.html";
        return;
    }

    onSnapshot(doc(db, "users", user.uid), (snap) => {

        if (snap.exists()) {

            document.getElementById("balance").innerText =
                snap.data().balance || 0;

        }

    });

});
</script>

</body>
</html>
