<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vegas | Debit</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Hind Siliguri',sans-serif;
    min-height:100vh;
    background:url("https://raw.githubusercontent.com/theworldvegas/theworldvegas/main/assets/background.jpg") center center/cover no-repeat fixed;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.box{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,.10);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.18);
    border-radius:22px;
    padding:20px;
    box-shadow:0 20px 45px rgba(0,0,0,.45);
}

.top-banner{
    width:100%;
    margin-bottom:20px;
}

.top-banner img{
    width:100%;
    display:block;
    border-radius:18px;
    box-shadow:
        0 0 18px rgba(90,120,255,.25),
        0 10px 25px rgba(0,0,0,.45);
}

.balance{
    margin-bottom:18px;
    text-align:center;
    color:#fff;
    font-size:18px;
    font-weight:bold;
}

label{
    display:block;
    margin-top:16px;
    margin-bottom:6px;
    color:#fff;
    font-size:15px;
    font-weight:600;
}

input,
select{
    width:100%;
    padding:13px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.25);
    background:rgba(255,255,255,.15);
    color:#fff;
    font-size:15px;
    outline:none;
}

input::placeholder{
    color:rgba(255,255,255,.7);
}

select option{
    color:#000;
}

.submit-btn{
    width:100%;
    margin-top:22px;
    padding:14px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#ff9800,#ff5722);
    color:#fff;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
}

.submit-btn:disabled{
    opacity:.6;
}

.note{
    margin-top:18px;
    text-align:center;
    color:#fff;
    font-size:13px;
}
</style>
</head>

<body>

<div class="box">

<div class="top-banner">
<img src="https://raw.githubusercontent.com/theworldvegas/theworldvegas/main/assets/pic1.gif" alt="Withdraw Banner">
</div>

<div class="balance">
Audit: ৳ <span id="balance">0</span>
</div>

<input
type="text"
id="mobile"
placeholder="Phone Number">

<label>Payment Method</label>

<select id="method">
<option value="">Payment Method</option>
<option value="Bkash">Bkash</option>
<option value="Nagad">Nagad</option>
<option value="Rocket">Rocket</option>
</select>

<label>Debit Amount</label>

<input
type="number"
id="amount"
placeholder="Debit Dolar">

<button
id="submitBtn"
class="submit-btn">
Withdraw Submit
</button>

<div class="note">
Withdraw সফল করতে সঠিক ফোন নাম্বার ব্যবহার করুন।
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
import {
  getFirestore,
  doc,
  getDoc,
  addDoc,
  collection,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDzC0YtyxLS0y2gqCHMElbXQgYQBkB_2WQ",
  authDomain: "theworldvegas-53640.firebaseapp.com",
  projectId: "theworldvegas-53640"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentBalance = 0;

const balanceEl = document.getElementById("balance");
const submitBtn = document.getElementById("submitBtn");

onAuthStateChanged(auth, async(user)=>{
  if(!user){
    location.href = "index.html";
    return;
  }

  currentUser = user;

  const snap = await getDoc(doc(db,"users",user.uid));

  if(snap.exists()){
    currentBalance = snap.data().balance || 0;
    balanceEl.innerText = currentBalance;
  }
});

submitBtn.onclick = async ()=>{

  const mobile =
    document.getElementById("mobile").value.trim();

  const method =
    document.getElementById("method").value;

  const amount =
    Number(document.getElementById("amount").value);

  if(!mobile || !method || amount <= 0){
    alert("সব তথ্য পূরণ করুন");
    return;
  }

  if(amount > currentBalance){
    alert("পর্যাপ্ত ব্যালেন্স নেই");
    return;
  }

  submitBtn.disabled = true;
  submitBtn.innerText = "Processing...";

  try{

    await addDoc(collection(db,"withdraws"),{
      uid: currentUser.uid,
      phone: mobile,
      method: method,
      amount: amount,
      status: "pending",
      createdAt: serverTimestamp()
    });

    await addDoc(collection(db,"transactions"),{
      uid: currentUser.uid,
      type: "withdraw",
      amount: amount,
      method: method,
      phone: mobile,
      status: "pending",
      createdAt: serverTimestamp()
    });

  }catch(err){
    console.error(err);
  }finally{
    location.href = "transaction.html";
  };

};
</script>

</body>
</html>
