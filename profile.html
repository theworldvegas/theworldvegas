<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biniyog | Dollar Exchange Rate</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background:url("https://raw.githubusercontent.com/theworldvegas/theworldvegas/main/assets/background.jpg") center center no-repeat;
    background-size:cover;
    background-attachment:fixed;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
    backdrop-filter:blur(4px);
}

.container{
    position:relative;
    z-index:2;
    width:90%;
    max-width:420px;
}

.card{
    background:rgba(15,20,35,.45);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.12);
    border-radius:25px;
    padding:35px 25px;
    text-align:center;

    box-shadow:
        0 0 25px rgba(0,255,255,.15),
        0 10px 35px rgba(0,0,0,.5);
}

.title{
    font-size:30px;
    font-weight:700;
    color:#22ffe6;
    text-shadow:0 0 12px rgba(34,255,230,.6);
    margin-bottom:12px;
}

.subtitle{
    color:#d8ffff;
    font-size:15px;
    margin-bottom:35px;
}
  .icon-box{
    width:140px;
    height:140px;
    margin:0 auto 25px;
    border-radius:50%;
    background:linear-gradient(135deg,#22ffe6,#00c9a7);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:70px;
    color:#062b31;
    box-shadow:
        0 0 25px rgba(34,255,230,.7),
        inset 0 0 15px rgba(255,255,255,.35);
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        box-shadow:
            0 0 20px rgba(34,255,230,.5),
            inset 0 0 10px rgba(255,255,255,.25);
    }
    to{
        box-shadow:
            0 0 40px rgba(34,255,230,.9),
            inset 0 0 18px rgba(255,255,255,.4);
    }
}

.open-btn{
    display:inline-block;
    margin-top:12px;
    padding:14px 28px;
    background:#22ffe6;
    color:#081b2d;
    text-decoration:none;
    font-size:18px;
    font-weight:700;
    border-radius:14px;
    transition:.3s;
    box-shadow:0 8px 20px rgba(34,255,230,.35);
}

.open-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 25px rgba(34,255,230,.6);
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="title">
Dollar Exchange Rate
</div>

<div class="subtitle">
Today's Live USD → BDT Rate
</div>

<div class="icon-box">
💵
</div>

<a class="open-btn"
target="_blank"
href="https://www.google.com/search?q=dollar+to+taka+today+calculator&source=chrome">
Open Exchange Rate
</a>
</div>

</div>

<script>
const exchangeUrl =
"https://www.google.com/search?q=dollar+to+taka+today+calculator&oq=today+dollar+to+taka+cal&gs_lcrp=EgZjaHJvbWUqCAgBEAAYFhgeMgYIABBFGDkyCAgBEAAYFhgeMggIAhAAGBYYHjINCAMQABiGAxiABBiKBTINCAQQABiGAxiABBiKBTINCAUQABiGAxiABBiKBTIHCAYQABjvBTIKCAcQABiABBiiBDIHCAgQABjvBTIHCAkQABjvBTIHCAoQABjvBdIBCTI5NjAyajBqN6gCFLACAfEFE_ZD0tIzD1DxBRP2Q9LSMw9Q8QUT9kPS0jMPUA&sourceid=chrome-mobile&source=chrome.ob&ie=UTF-8";

// পুরো কার্ডে ক্লিক করলেও লিংক ওপেন হবে
document.querySelector(".card").addEventListener("click", function(e){

    // Button-এ ক্লিক করলে ডাবল ওপেন হবে না
    if(e.target.tagName !== "A"){
        window.open(exchangeUrl, "_blank");
    }

});
</script>

</body>
</html>
