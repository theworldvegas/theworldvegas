<body>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore,
  doc,
  collection,
  onSnapshot,
  getDoc,
  setDoc,
  updateDoc,
  query,
  orderBy,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDzC0YtyxLS0y2gqCHMElbXQgYQBkB_2WQ",
  authDomain: "theworldvegas-53640.firebaseapp.com",
  projectId: "theworldvegas-53640"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const logoutBtn = document.getElementById("logoutBtn");

let showBalance = false;
let liveBalance = 0;
let currentUser = null;

/* ===============================
   AUTH + LOAD BALANCE
=================================*/
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.replace("index.html");
    return;
  }
  currentUser = user;

  const userRef = doc(db,"users",user.uid);
  const snap = await getDoc(userRef);
  const today = new Date().toISOString().split("T")[0];

  const baseData = {
    uid: user.uid,
    name: snap.exists() ? snap.data().name || "" : "",
    phone: snap.exists() ? snap.data().phone || "" : "",
    role: snap.exists() ? snap.data().role || "user" : "user",
    balance: snap.exists() ? snap.data().balance || 0 : 0,
    loginStreak: snap.exists() ? snap.data().loginStreak || 0 : 0,
    lastLoginDate: snap.exists() ? snap.data().lastLoginDate || "" : today,
    createdAt: snap.exists() ? snap.data().createdAt || serverTimestamp() : serverTimestamp(),
  };

  if(!snap.exists()){
    await setDoc(userRef, baseData);
  } else {
    await updateDoc(userRef, baseData);
  }

  onSnapshot(userRef,(docSnap)=>{
    if(docSnap.exists()){
      liveBalance = docSnap.data().balance || 0;
      if(showBalance){
        balanceBtn.innerText = "© " + liveBalance;
      }
    }
  });

/* Logout */
logoutBtn.addEventListener("click", async ()=>{
  await signOut(auth);
  window.location.replace("index.html");
});

/* ===============================
   Slider Auto + Swipe + Scroll
=================================*/
const slides = document.getElementById("slides");
let index = 0;
const total = slides.children.length;

function showSlide(i){
  slides.style.transform = `translateX(-${i * 100}%)`;
}

function nextSlide(){
  index = (index + 1) % total;
  showSlide(index);
}

// auto slide every 5 seconds
let sliderInterval = setInterval(nextSlide, 5000);

/* swipe */
let startX = 0;
let endX = 0;

const slider = document.getElementById("slider");
slider.addEventListener("touchstart", (e)=>{
  startX = e.touches[0].clientX;
  clearInterval(sliderInterval);
});
slider.addEventListener("touchend", (e)=>{
  endX = e.changedTouches[0].clientX;
  const diff = endX - startX;

  if(diff > 50){
    index = (index - 1 + total) % total;
    showSlide(index);
  } else if(diff < -50){
    index = (index + 1) % total;
    showSlide(index);
  }

  sliderInterval = setInterval(nextSlide, 5000);
});
</script>

</body>
