<!DOCTYPE html>
<html lang="bn">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Biniyog | Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
-webkit-tap-highlight-color:transparent;
}

html{
scroll-behavior:smooth;
}

body{

background:#0D031B;
color:#fff;
overflow-x:hidden;
min-height:100vh;
position:relative;

}

/* ===========================
   Animated Background
=========================== */

body::before{

content:"";
position:fixed;
left:-50%;
top:-50%;
width:200%;
height:200%;

background:

radial-gradient(circle,#6d28d922 0%,transparent 20%),
radial-gradient(circle,#3b82f622 0%,transparent 18%),
radial-gradient(circle,#ec489922 0%,transparent 16%);

filter:blur(90px);

animation:rotateBG 30s linear infinite;

z-index:-10;

}

@keyframes rotateBG{

0%{
transform:rotate(0deg);
}

100%{
transform:rotate(360deg);
}

}

/* Canvas */

#bgCanvas{

position:fixed;

left:0;
top:0;

width:100%;
height:100%;

z-index:-5;

pointer-events:none;

}

/* ===========================
   Header
=========================== */

.header{

margin:14px;

padding:14px 16px;

display:flex;

justify-content:space-between;

align-items:center;

background:rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.12);

border-radius:20px;

box-shadow:

0 10px 30px rgba(0,0,0,.35);

}

/* Balance */

.balance{

padding:12px 22px;

border-radius:14px;

background:linear-gradient(135deg,#2563eb,#7c3aed);

font-size:14px;

font-weight:600;

cursor:pointer;

transition:.25s;

box-shadow:

0 8px 25px rgba(37,99,235,.35);

}

.balance:active{

transform:scale(.96);

}

/* Banner */

.banner{

margin:14px;

border-radius:20px;

overflow:hidden;

box-shadow:

0 10px 30px rgba(0,0,0,.4);

}

.banner img{

display:block;

width:100%;

}

/* ===========================
   Menu
=========================== */

.menu{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:16px;

padding:16px;

}

.menu a{

position:relative;

height:88px;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-decoration:none;

color:#fff;

font-size:30px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.12);

border-radius:20px;

overflow:hidden;

transition:.25s;

box-shadow:

0 10px 25px rgba(0,0,0,.45);

}

.menu a span{

margin-top:6px;

font-size:13px;

font-weight:500;

}

.menu a:hover{

transform:translateY(-4px);

}

.menu a:active{

transform:scale(.95);

}

.menu a::before{

content:"";

position:absolute;

top:0;

left:-70%;

width:55%;

height:100%;

background:

linear-gradient(

120deg,

transparent,

rgba(255,255,255,.30),

transparent

);

transform:skewX(-20deg);

transition:.8s;

}

.menu a:hover::before{

left:160%;

}

/* Logout */

.fixed-logout{

width:80px;

height:48px;

margin:25px auto;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#ff3b3b,#8b0000);

border-radius:16px;

font-size:28px;

cursor:pointer;

box-shadow:

0 0 18px rgba(255,0,0,.35);

transition:.25s;

}

.fixed-logout:active{

transform:scale(.94);

}
  </style>

</head>

<body>

<!-- ==========================
 Premium Animated Background
========================== -->

<canvas id="bgCanvas"></canvas>

<!-- ==========================
 Header
========================== -->

<div class="header">

    <div class="balance" id="balanceBtn">
        Tap To Balance
    </div>

</div>

<!-- ==========================
 Banner
========================== -->

<div class="banner">

<img
src="https://raw.githubusercontent.com/theworldvegas/theworldvegas/main/assets/head.gif"
alt="Banner">

</div>

<!-- ==========================
 Menu
========================== -->

<div class="menu">

 Logout Button
========================== -->

class="fixed-logout"

  <!-- ==========================
 Firebase + Authentication
========================== -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
setDoc,
updateDoc,
onSnapshot,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ==========================
 Firebase Config
========================== */

const firebaseConfig={

apiKey:"AIzaSyDzC0YtyxLS0y2gqCHMElbXQgYQBkB_2WQ",

authDomain:"theworldvegas-53640.firebaseapp.com",

projectId:"theworldvegas-53640"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getFirestore(app);

/* ==========================
 Elements
========================== */

const balanceBtn=document.getElementById("balanceBtn");

const logoutBtn=document.getElementById("logoutBtn");

let liveBalance=0;

let showBalance=false;

/* ==========================
 Login Check
========================== */

onAuthStateChanged(auth,async(user)=>{

if(!user){

window.location.replace("index.html");

return;

}

const userRef=doc(db,"users",user.uid);

const snap=await getDoc(userRef);

const today=new Date().toISOString().split("T")[0];

if(!snap.exists()){

await setDoc(userRef,{

uid:user.uid,

balance:0,

role:"user",

createdAt:serverTimestamp(),

lastLoginDate:today

});

}else{

await updateDoc(userRef,{

lastLoginDate:today

});

}

/* ==========================
 Live Balance
========================== */

onSnapshot(userRef,(docSnap)=>{

if(!docSnap.exists()) return;

const data=docSnap.data();

liveBalance=data.balance||0;

if(showBalance){

balanceBtn.textContent="৳ "+liveBalance.toLocaleString();

}

});
   /* ==========================
 Balance Toggle
========================== */

balanceBtn.addEventListener("click",()=>{

showBalance=!showBalance;

if(showBalance){

balanceBtn.textContent="৳ "+liveBalance.toLocaleString();

}else{

balanceBtn.textContent="Tap To Balance";

}

});

/* ==========================
 Logout
========================== */

logoutBtn.addEventListener("click",async()=>{

try{

await signOut(auth);

window.location.replace("index.html");

}catch(error){

console.error(error);

alert("Logout failed!");

}

});

/* ==========================
 End Authentication
========================== */

});

/* ==========================
 Page Animation
========================== */

window.addEventListener("load",()=>{

document.body.animate(

[

{

opacity:0,

transform:"translateY(15px)"

},

{

opacity:1,

transform:"translateY(0)"

}

],

{

duration:700,

easing:"ease"

}

);

});

/* ==========================
 Canvas Setup
========================== */

const canvas=document.getElementById("bgCanvas");

const ctx=canvas.getContext("2d");

function resizeCanvas(){

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

}

resizeCanvas();

window.addEventListener("resize",resizeCanvas);

const particles=[];

for(let i=0;i<60;i++){

particles.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

r:Math.random()*2+1,

dx:(Math.random()-.5)*0.4,

dy:(Math.random()-.5)*0.4,

h:Math.random()*360

});

}
  /* ==========================
 Premium Particle Animation
========================== */

function animateBackground(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;

p.h+=0.3;

ctx.beginPath();

ctx.arc(p.x,p.y,p.r,0,Math.PI*2);

ctx.fillStyle=`hsla(${p.h},100%,65%,0.75)`;

ctx.shadowBlur=18;

ctx.shadowColor=`hsla(${p.h},100%,60%,1)`;

ctx.fill();

});

requestAnimationFrame(animateBackground);

}

animateBackground();

/* ==========================
 Ripple Effect
========================== */

document.querySelectorAll(".menu a,.fixed-logout,.balance")

.forEach(button=>{

button.style.position="relative";

button.style.overflow="hidden";

button.addEventListener("click",function(e){

const ripple=document.createElement("span");

const size=Math.max(this.clientWidth,this.clientHeight);

ripple.style.width=size+"px";
ripple.style.height=size+"px";

ripple.style.position="absolute";
ripple.style.borderRadius="50%";
ripple.style.background="rgba(255,255,255,.35)";
ripple.style.pointerEvents="none";
ripple.style.left=(e.offsetX-size/2)+"px";
ripple.style.top=(e.offsetY-size/2)+"px";
ripple.style.transform="scale(0)";
ripple.style.animation="ripple .6s linear";

this.appendChild(ripple);

setTimeout(()=>{

ripple.remove();

},600);

});

});

const rippleStyle=document.createElement("style");

rippleStyle.textContent=`

@keyframes ripple{

to{

transform:scale(4);

opacity:0;

}

}

`;

document.head.appendChild(rippleStyle);

/* ==========================
 End Script
========================== */

</script>

</body>

</html>
