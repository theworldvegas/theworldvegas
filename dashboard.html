<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biniyog | Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#0D031B;
}

.logout, .inbox-icon{
  font-size:28px;
  cursor:pointer;
  padding:4px 8px;
  border-radius:6px;
  position:relative;
}
.inbox-badge{
  position:absolute;
  top:-6px;
  right:-6px;
  background:#22c55e;
  color:#fff;
  font-size:10px;
  font-weight:bold;
  padding:2px 5px;
  border-radius:50%;
}

/* Menu */
.menu{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:18px;
    padding:20px;
}

.menu a{
    position:relative;
    height:95px;
    text-decoration:none;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    color:#fff;
    font-size:18px;
    font-weight:700;

    background:linear-gradient(145deg,#3b3348,#2a2438);

    border-radius:24px;
    border:2px solid rgba(255,255,255,.18);

    box-shadow:
      inset 2px 2px 4px rgba(255,255,255,.18),
      inset -2px -2px 4px rgba(0,0,0,.35),
      0 10px 25px rgba(0,0,0,.55);

    transition:.25s ease;
    overflow:hidden;
}

/* Glow Border */
.menu a::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:24px;
    padding:2px;
    background:linear-gradient(135deg,#b76cff,#4a7dff,#8f5fff);
    -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;
            mask-composite:exclude;
    opacity:.75;
}

/* Shine */
.menu a::before{
    content:"";
    position:absolute;
    top:-120%;
    left:-60%;
    width:60%;
    height:300%;
    background:rgba(255,255,255,.18);
    transform:rotate(30deg);
    transition:.7s;
}

.menu a:hover::before{
    left:140%;
}

.menu a:hover{
    transform:translateY(-5px);
    box-shadow:
      0 0 18px rgba(124,92,255,.55),
      0 14px 35px rgba(0,0,0,.6);
}

.menu a:active{
    transform:scale(.96);
}

.menu a span{
    margin-top:10px;
    font-size:14px;
    color:#fff;
}
.menu span{margin-top:6px}

/* Banner */
.banner{margin:12px}
.banner img{width:100%;border-radius:10px}

/* Slider */
.slider{
  width:100%;
  overflow:hidden;
  position:relative;
}
.slider img{
  width:100%;
  display:block;
  border-radius:10px;
}
.slider .slides{
  display:flex;
  transition:transform 0.5s ease-in-out;
}

.scrollable{
  max-height:120px;
  overflow-y:auto;
}
  
/* Logout at bottom */
.fixed-logout{
    width:90px;
    height:50px;

    margin:25px auto;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:28px;

    background:linear-gradient(180deg,#c40f0f,#8f0000);

    color:#fff;

    border-radius:15px;
    border:2px solid rgba(255,255,255,.2);

    box-shadow:
        0 0 15px rgba(255,0,0,.35),
        inset 2px 2px 4px rgba(255,255,255,.2);

    cursor:pointer;
    transition:.25s;
}

.fixed-logout:active{
    transform:scale(.95);
}

/* Bottom Banner */
.bottom-banner{
    margin:0 20px 20px;
}

.bottom-banner img{
    width:100%;
    display:block;
    border-radius:18px;

    border:2px solid rgba(255,255,255,.15);

    box-shadow:
        0 0 18px rgba(90,120,255,.25),
        0 10px 25px rgba(0,0,0,.45);

    transition:.35s;
}

.bottom-banner img:hover{
    transform:scale(1.02);
}
</style>
</head>

<body>

  <div class="header">
  <div class="left">
    <strong id="luckyBtn"></strong>
    <div class="balance" id="balanceBtn"></div>
  </div>
  <div class="icons">
    <div class="inbox-icon" id="inboxIcon">
      <span class="inbox-badge" id="inboxBadge" style="display:none;">0</span>
    </div>
  </div>
</div>
  
<!-- head.png Picture -->
<div style="margin:6px;">
  <img src="https://raw.githubusercontent.com/theworldvegas/theworldvegas/main/assets/under.gif" alt="Head Image" style="width:100%; border-radius:10px;">
</div>

<div class="menu">
  <a href="task.html">📊<span>Vibes Rating</span></a>
  <a href="deposit.html">🪙<span>depo</span></a>
  <a href="withdraw.html">💳<span>Withdraw</span></a>
  <a href="plan.html">💷<span>Audit</span></a>
  <a href="profile.html">📽️<span>Gallery</span></a>
  <a href="refer.html">🕸️<span>💷Increase</span></a>
  <a href="transaction.html">🧬<span>Memoir</span></a>
  <a href="about.html">📬<span>Contract</span></a>
</div>

<div class="bottom-banner">
    <img src="https://raw.githubusercontent.com/theworldvegas/theworldvegas/main/assets/head.gif" alt="Bottom Banner">
</div>

<div class="fixed-logout" id="logoutBtn">🛅</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore,
  doc,
  collection,
  onSnapshot,
  getDoc,
  setDoc,
  updateDoc,
  query,
  orderBy,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDzC0YtyxLS0y2gqCHMElbXQgYQBkB_2WQ",
  authDomain: "theworldvegas-53640.firebaseapp.com",
  projectId: "theworldvegas-53640"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const balanceBtn = document.getElementById("balanceBtn");
const luckyBtn = document.getElementById("luckyBtn");
const inboxList = document.getElementById("inboxList");
const inboxSection = document.getElementById("inboxSection");
const inboxIcon = document.getElementById("inboxIcon");
const inboxBadge = document.getElementById("inboxBadge");
const logoutBtn = document.getElementById("logoutBtn");

let showBalance = false;
let liveBalance = 0;
let currentUser = null;

/* ===============================
   AUTH + LOAD BALANCE
=================================*/
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.replace("index.html");
    return;
  }
  currentUser = user;

  const userRef = doc(db,"users",user.uid);
  const snap = await getDoc(userRef);
  const today = new Date().toISOString().split("T")[0];

  const baseData = {
    uid: user.uid,
    name: snap.exists() ? snap.data().name || "" : "",
    phone: snap.exists() ? snap.data().phone || "" : "",
    role: snap.exists() ? snap.data().role || "user" : "user",
    balance: snap.exists() ? snap.data().balance || 0 : 0,
    loginStreak: snap.exists() ? snap.data().loginStreak || 0 : 0,
    lastLoginDate: snap.exists() ? snap.data().lastLoginDate || "" : today,
    createdAt: snap.exists() ? snap.data().createdAt || serverTimestamp() : serverTimestamp(),
  };

  if(!snap.exists()){
    await setDoc(userRef, baseData);
  } else {
    await updateDoc(userRef, baseData);
  }

  onSnapshot(userRef,(docSnap)=>{
    if(docSnap.exists()){
      liveBalance = docSnap.data().balance || 0;
      if(showBalance){
        balanceBtn.innerText = "© " + liveBalance;
      }
    }
  });

  const inboxRef = collection(db,"inbox");
  const inboxQuery = query(inboxRef, orderBy("createdAt","desc"));
  onSnapshot(inboxQuery,(snapshot)=>{
    let unreadCount = 0;
    inboxList.innerHTML = "";
    if(snapshot.empty){
      inboxList.innerHTML = "<p>No messages yet.</p>";
    }
    snapshot.forEach(doc=>{
      const data = doc.data();
      if(data.uid === user.uid){
        const p = document.createElement("p");
        p.innerText = data.message || "";
        inboxList.appendChild(p);
        if(!data.read){
          unreadCount++;
        }
      }
    });
    if(unreadCount>0){
      inboxBadge.style.display = "inline";
      inboxBadge.innerText = unreadCount;
    } else {
      inboxBadge.style.display = "none";
    }
  });
});

/* Balance toggle */
balanceBtn.addEventListener("click",()=>{
  showBalance = !showBalance;
  balanceBtn.innerText = showBalance ? "© " + liveBalance : "Tap To Balance";
});

/* Lucky Bet */
luckyBtn.addEventListener("click",()=>{ window.location.href = "lucky-bet.html"; });

/* Inbox redirect */
inboxIcon.addEventListener("click",()=>{ window.location.href = "inbox.html"; });

/* Logout */
logoutBtn.addEventListener("click", async ()=>{
  await signOut(auth);
  window.location.replace("index.html");
});

/* ===============================
   Slider Auto + Swipe + Scroll
=================================*/
const slides = document.getElementById("slides");
let index = 0;
const total = slides.children.length;

function showSlide(i){
  slides.style.transform = `translateX(-${i * 100}%)`;
}

function nextSlide(){
  index = (index + 1) % total;
  showSlide(index);
}

// auto slide every 5 seconds
let sliderInterval = setInterval(nextSlide, 5000);

/* swipe */
let startX = 0;
let endX = 0;

const slider = document.getElementById("slider");
slider.addEventListener("touchstart", (e)=>{
  startX = e.touches[0].clientX;
  clearInterval(sliderInterval);
});
slider.addEventListener("touchend", (e)=>{
  endX = e.changedTouches[0].clientX;
  const diff = endX - startX;

  if(diff > 50){
    index = (index - 1 + total) % total;
    showSlide(index);
  } else if(diff < -50){
    index = (index + 1) % total;
    showSlide(index);
  }

  sliderInterval = setInterval(nextSlide, 5000);
});
</script>

</body>
</html>
