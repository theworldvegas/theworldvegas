<style>
@import url('https://googleapis.com');

*{box-sizing:border-box}
body{
  margin:0;
  font-family: 'Poppins', Arial, sans-serif;
  /* পূর্বের লগইন পেজের মতো রেডিয়াল নিয়ন ডার্ক ব্যাকগ্রাউন্ড */
  background: radial-gradient(circle at center, #17385c 0%, #0d1b2a 100%);
  color:#fff;
  min-height: 100vh;
  padding-bottom: 30px;
}

/* Header স্টাইল */
.header{
  background: rgba(255, 255, 255, 0.03);
  border-bottom: 1px solid rgba(0, 242, 254, 0.2);
  backdrop-filter: blur(10px);
  padding: 16px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header .left{
  display: flex;
  align-items: center;
  gap: 15px;
}
#luckyBtn {
  font-size: 16px;
  font-weight: 500;
  color: #00f2fe;
  cursor: pointer;
  text-shadow: 0 0 10px rgba(0, 242, 254, 0.4);
}
.balance{
  background: rgba(0, 242, 254, 0.2);
  color: #fff;
  border: 1px solid rgba(0, 242, 254, 0.4);
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s;
}
.balance:hover {
  background: rgba(0, 242, 254, 0.35);
  box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
}
.inbox-icon{
  font-size: 22px;
  cursor: pointer;
  padding: 6px;
  position: relative;
  color: #00f2fe;
}
.inbox-badge{
  position: absolute;
  top: 0px;
  right: 0px;
  background: #ff3b30;
  color: #fff;
  font-size: 10px;
  font-weight: bold;
  padding: 2px 6px;
  border-radius: 10px;
}

/* ইমেজ কন্টেইনার */
.img-container {
  margin: 15px;
  border: 1px solid rgba(0, 242, 254, 0.2);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}
.img-container img {
  width: 100%;
  display: block;
}

/* মেনু গ্রিড (ক্যাপসুল গ্লাস স্টাইল) */
.menu{
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  padding: 15px;
}
.menu a{
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 16px;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  font-size: 13px;
  font-weight: 500;
  color: #fff;
  text-decoration: none;
  transition: all 0.3s ease;
}
.menu a:hover {
  background: rgba(0, 242, 254, 0.15);
  border-color: #00f2fe;
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0, 242, 254, 0.15);
}
.menu i {
  font-size: 20px;
  color: #00f2fe;
  margin-bottom: 6px;
}

/* ব্যানার এবং স্লাইডার */
.banner{
  margin: 15px;
}
.slider{
  width: 100%;
  overflow: hidden;
  position: relative;
  border: 1px solid rgba(0, 242, 254, 0.2);
  border-radius: 16px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}
.slider .slides{
  display: flex;
  transition: transform 0.5s ease-in-out;
}
.slider img{
  width: 100%;
  display: block;
}

.static-banners img {
  width: 100%;
  border-radius: 16px;
  border: 1px solid rgba(0, 242, 254, 0.15);
  margin-top: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

/* ইনবক্স গ্লাস স্টাইল */
.inbox{
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(0, 242, 254, 0.2);
  margin: 15px;
  padding: 16px;
  border-radius: 16px;
  backdrop-filter: blur(10px);
}
.inbox h3{
  margin-top: 0;
  color: #00f2fe;
  font-weight: 600;
  font-size: 16px;
}
.inbox p{
  font-size: 14px;
  margin: 8px 0;
  color: rgba(255, 255, 255, 0.8);
  padding: 8px;
  background: rgba(255, 255, 255, 0.03);
  border-radius: 8px;
}
.scrollable{
  max-height: 120px;
  overflow-y: auto;
}

/* ফিক্সড লগআউট বাটন */
.fixed-logout{
  display: block;
  max-width: 140px;
  padding: 12px;
  font-size: 14px;
  font-weight: 600;
  text-align: center;
  background: transparent;
  border: 1.5px solid rgba(255, 3b, 30, 0.5);
  color: #ff3b30;
  cursor: pointer;
  border-radius: 30px;
  margin: 30px auto 10px auto;
  transition: all 0.3s;
}
.fixed-logout:hover {
  background: rgba(255, 59, 48, 0.1);
  border-color: #ff3b30;
  box-shadow: 0 0 12px rgba(255, 59, 48, 0.3);
}
</style>
</head>

<body>

<div class="header">
  <div class="left">
    <strong id="luckyBtn">🎯 Lucky Bet</strong>
    <div class="balance" id="balanceBtn">Tap To Balance</div>
  </div>
  <div class="icons">
    <div class="inbox-icon" id="inboxIcon">
      <i class="fa-regular fa-envelope"></i>
      <span class="inbox-badge" id="inboxBadge" style="display:none;">0</span>
    </div>
  </div>
</div>

<!-- Head Image কন্টেইনার -->
<div class="img-container">
  <img src="https://raw.githubusercontent.com/Binoyog/biniyog/main/assets/head.png" alt="Head Image">
</div>

<!-- মেনু সেকশন (নিন্মোক্ত আইকনসহ চমৎকার ক্যাপসুল লুক) -->
<div class="menu">
  <a href="task.html"><i class="fa-regular fa-clipboard"></i>Task</a>
  <a href="deposit.html"><i class="fa-solid fa-wallet"></i>Deposit</a>
  <a href="withdraw.html"><i class="fa-solid fa-money-bill-transfer"></i>Withdraw</a>
  <a href="plan.html"><i class="fa-solid fa-cubes"></i>Plan</a>
  <a href="profile.html"><i class="fa-regular fa-user"></i>Profile</a>
  <a href="refer.html"><i class="fa-solid fa-users"></i>Refer</a>
  <a href="transaction.html"><i class="fa-solid fa-arrow-rotate-left"></i>History</a>
  <a href="about.html"><i class="fa-solid fa-circle-info"></i>About</a>
</div>

<!-- ব্যানার স্লাইডার সেকশন -->
<div class="banner">
  <div class="slider" id="slider">
    <div class="slides" id="slides">
      <img src="https://raw.githubusercontent.com/Binoyog/biniyog/main/assets/offer2.jpg" alt="Banner 1">
      <img src="https://raw.githubusercontent.com/Binoyog/biniyog/main/assets/offer1.jpg" alt="Banner 2">
      <img src="https://raw.githubusercontent.com/Binoyog/biniyog/main/assets/offer3.png" alt="Banner 3">
    </div>
  </div>

  <!-- স্ট্যাটিক ব্যানার ছবিসমূহ -->
  <div class="static-banners">
    <img src="https://raw.githubusercontent.com/Binoyog/biniyog/main/assets/offer.png" alt="Big Offer 1">
    <img src="https://raw.githubusercontent.com/Binoyog/biniyog/main/assets/pic2.jpeg" alt="Big Offer 2">
  </div>
</div>

<!-- ইনবক্স মেসেজ লিস্ট -->
<div class="inbox" id="inboxSection" style="display:none;">
  <h3>Inbox</h3>
  <div class="scrollable" id="inboxList">
    <p>No messages yet.</p>
  </div>
</div>

<!-- লগআউট বাটন -->
<div class="fixed-logout" id="logoutBtn"><i class="fa-solid fa-power-off" style="margin-right:6px;"></i>Logout</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore,
  doc,
  collection,
  onSnapshot,
  getDoc,
  setDoc,
  updateDoc,
  query,
  orderBy,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDzC0YtyxLS0y2gqCHMElbXQgYQBkB_2WQ",
  authDomain: "theworldvegas-53640.firebaseapp.com",
  projectId: "theworldvegas-53640"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const balanceBtn = document.getElementById("balanceBtn");
const luckyBtn = document.getElementById("luckyBtn");
const inboxList = document.getElementById("inboxList");
const inboxSection = document.getElementById("inboxSection");
const inboxIcon = document.getElementById("inboxIcon");
const inboxBadge = document.getElementById("inboxBadge");
const logoutBtn = document.getElementById("logoutBtn");

let showBalance = false;
let liveBalance = 0;
let currentUser = null;

/* ===============================
   AUTH + LOAD BALANCE
=================================*/
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.replace("index.html");
    return;
  }
  currentUser = user;

  const userRef = doc(db,"users",user.uid);
  const snap = await getDoc(userRef);
  const today = new Date().toISOString().split("T")[0];

  const baseData = {
    uid: user.uid,
    name: snap.exists() ? snap.data().name || "" : "",
    phone: snap.exists() ? snap.data().phone || "" : "",
    role: snap.exists() ? snap.data().role || "user" : "user",
    balance: snap.exists() ? snap.data().balance || 0 : 0,
    loginStreak: snap.exists() ? snap.data().loginStreak || 0 : 0,
    lastLoginDate: snap.exists() ? snap.data().lastLoginDate || "" : today,
    createdAt: snap.exists() ? snap.data().createdAt || serverTimestamp() : serverTimestamp(),
  };

  if(!snap.exists()){
    await setDoc(userRef, baseData);
  } else {
    await updateDoc(userRef, baseData);
  }

  onSnapshot(userRef,(docSnap)=>{
    if(docSnap.exists()){
      liveBalance = docSnap.data().balance || 0;
      if(showBalance){
        balanceBtn.innerText = "© " + liveBalance;
      }
    }
  });

  const inboxRef = collection(db,"inbox");
  const inboxQuery = query(inboxRef, orderBy("createdAt","desc"));
  onSnapshot(inboxQuery,(snapshot)=>{
    let unreadCount = 0;
    inboxList.innerHTML = "";
    if(snapshot.empty){
      inboxList.innerHTML = "<p>No messages yet.</p>";
    }
    snapshot.forEach(doc=>{
      const data = doc.data();
      if(data.uid === user.uid){
        const p = document.createElement("p");
        p.innerText = data.message || "";
        inboxList.appendChild(p);
        if(!data.read){
          unreadCount++;
        }
      }
    });
    if(unreadCount>0){
      inboxBadge.style.display = "inline";
      inboxBadge.innerText = unreadCount;
    } else {
      inboxBadge.style.display = "none";
    }
  });
});

/* Balance toggle */
balanceBtn.addEventListener("click",()=>{
  showBalance = !showBalance;
