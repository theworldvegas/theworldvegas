<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vegas</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:url("https://raw.githubusercontent.com/theworldvegas/theworldvegas/main/assets/background.jpg") center center no-repeat;
    background-size:cover;
    background-attachment:fixed;

    overflow:hidden;
}

.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:25px;
    width:100%;
    max-width:450px;
    padding:20px;
}

.container img{
    width:100%;
    border-radius:20px;

    box-shadow:
        0 0 20px rgba(255,255,255,.15),
        0 10px 25px rgba(0,0,0,.45);

    transition:.3s;
}

.container img:hover{
    transform:scale(1.02);
}
</style>
</head>

<body>

<div class="container">

    <img src="https://raw.githubusercontent.com/theworldvegas/theworldvegas/main/assets/rating.png" alt="pic 1">

    <img src="https://raw.githubusercontent.com/theworldvegas/theworldvegas/main/assets/pic1.gif" alt="Pic 2">

</div>

</body>
</html>
